<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Calculator</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#25D366">
  <style>
    body { font-family: sans-serif; padding: 10px; max-width: 400px; margin: auto; background: #f0f0f0; }
    .tabs { display: flex; margin-bottom: 10px; }
    .tab { flex: 1; padding: 12px; text-align: center; background: #ddd; border: none; font-weight: bold; }
    .tab.active { background: #25D366; color: white; }
    .content { display: none; background: white; padding: 16px; border-radius: 8px; }
    .content.active { display: block; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 18px; box-sizing: border-box; }
    button { background: #128C7E; color: white; border: none; border-radius: 8px; font-weight: bold; }
    .result { font-size: 20px; font-weight: bold; margin-top: 15px; text-align: center; color: #128C7E; }
    label { font-weight: bold; }
    h3 { margin-top: 0; text-align: center; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" onclick="openTab('tab1', this)">ताना</button>
    <button class="tab" onclick="openTab('tab2', this)">भरन</button>
    <button class="tab" onclick="openTab('tab3', this)">जोड़नी</button>
  </div>

  <div id="tab1" class="content active">
    <h3>ताना मेहनताना</h3>
    <label>धागों की संख्या:</label>
    <input type="number" id="t1_threads" placeholder="जैसे 3744">
    <label>लंबाई (मीटर):</label>
    <input type="number" id="t1_length" placeholder="जैसे 2000">
    <button onclick="calc1()">हिसाब लगाओ</button>
    <div class="result" id="result1"></div>
  </div>

  <div id="tab2" class="content">
    <h3>भरन</h3>
    <label>धागे की संख्या:</label>
    <input type="number" id="t2_threads" placeholder="जैसे 4000">
    <button onclick="calc2()">हिसाब लगाओ</button>
    <div class="result" id="result2"></div>
  </div>

  <div id="tab3" class="content">
    <h3>जोड़नी</h3>
    <label>धागे की संख्या:</label>
    <input type="number" id="t3_threads" placeholder="जैसे 4000">
    <button onclick="calc3()">हिसाब लगाओ</button>
    <div class="result" id="result3"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }

    function openTab(tabId, btn) {
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function calc1() {
      let t = document.getElementById('t1_threads').value;
      let l = document.getElementById('t1_length').value;
      if(t && l) {
        let ans = ((t * l) / 100000 * 20 + 100) * 1.5;
        document.getElementById('result1').innerHTML = "मेहनताना = ₹ " + ans.toFixed(2);
      } else {
        document.getElementById('result1').innerHTML = "दोनों खाने भरो";
      }
    }

    function calc2() {
      let t = document.getElementById('t2_threads').value;
      if(t) {
        let ans = ((t / 1000) * 120 + 120) / 2;
        document.getElementById('result2').innerHTML = "भरन = ₹ " + ans.toFixed(2);
      } else {
        document.getElementById('result2').innerHTML = "धागे की संख्या डालो";
      }
    }

    function calc3() {
      let t = document.getElementById('t3_threads').value;
      if(t) {
        let ans = ((t / 1000) * 120 + 120) / 2 * 1.5;
        document.getElementById('result3').innerHTML = "जोड़नी = ₹ " + ans.toFixed(2);
      } else {
        document.getElementById('result3').innerHTML = "धागे की संख्या डालो";
      }
    }
  </script>
</body>
</html>
